<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Online: Pemrograman Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Radio button custom styling */
        input[type="radio"]:checked + label {
            background-color: #eff6ff;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-4">

    <div id="app-container" class="bg-white rounded-xl shadow-lg w-full max-w-4xl overflow-hidden relative">
        
        <!-- Header -->
        <header class="bg-blue-600 text-white p-6 text-center border-b-4 border-blue-800">
            <h1 class="text-2xl md:text-3xl font-bold">Ujian Akhir: Pemrograman Web</h1>
            <p class="mt-2 text-blue-100">Jawablah 50 soal berikut dengan tepat.</p>
        </header>

        <!-- Container untuk konten dinamis (Form, Soal, Hasil) -->
        <div class="p-6 md:p-8" id="main-content">
            
            <!-- VIEW 1: Form Data Diri -->
            <div id="view-registration" class="block space-y-6">
                <h2 class="text-xl font-semibold border-b pb-2 mb-4 text-gray-700">Lengkapi Data Diri</h2>
                
                <form id="registration-form" class="space-y-4">
                    <div>
                        <label for="student-name" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap *</label>
                        <input type="text" id="student-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Masukkan nama Anda">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="student-nim" class="block text-sm font-medium text-gray-700 mb-1">NIM *</label>
                            <input type="text" id="student-nim" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Masukkan NIM">
                        </div>
                        <div>
                            <label for="student-class" class="block text-sm font-medium text-gray-700 mb-1">Kelas *</label>
                            <select id="student-class" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                                <option value="" disabled selected>Pilih Kelas</option>
                                <option value="TI-1A">TI-1A</option>
                                <option value="TI-1B">TI-1B</option>
                                <option value="TI-2A">TI-2A</option>
                                <option value="TI-2B">TI-2B</option>
                                <option value="TI-3A">TI-3A</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-colors duration-200 flex items-center justify-center gap-2">
                            Mulai Ujian
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>

            <!-- VIEW 2: Area Ujian -->
            <div id="view-quiz" class="hidden">
                <!-- Info Status Bar -->
                <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg mb-6 border border-blue-100">
                    <div class="text-sm font-medium text-blue-800">
                        Soal: <span id="current-question-num">1</span> / 50
                    </div>
                    <div class="text-sm font-medium text-blue-800 bg-white px-3 py-1 rounded-md shadow-sm border border-blue-200">
                        <span id="display-name-header"></span> (<span id="display-nim-header"></span>)
                    </div>
                </div>

                <!-- Kontainer Soal -->
                <div id="question-container" class="min-h-[300px]">
                    <h3 id="question-text" class="text-lg font-medium text-gray-800 mb-6 leading-relaxed">
                        <!-- Teks soal akan dimuat di sini -->
                    </h3>
                    
                    <div id="options-container" class="space-y-3">
                        <!-- Pilihan jawaban akan dimuat di sini -->
                    </div>
                </div>

                <!-- Navigasi Bawah -->
                <div class="mt-8 flex justify-between items-center border-t pt-4">
                    <button id="btn-prev" class="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Sebelumnya
                    </button>
                    
                    <!-- Indikator progress sederhana -->
                    <div class="hidden md:block w-1/3 bg-gray-200 rounded-full h-2.5">
                      <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 2%"></div>
                    </div>

                    <button id="btn-next" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
                        Selanjutnya
                    </button>
                    <button id="btn-submit" class="hidden px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors shadow-md">
                        Selesaikan Ujian
                    </button>
                </div>
            </div>

            <!-- VIEW 3: Hasil Ujian -->
            <div id="view-result" class="hidden">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-800">Ujian Selesai!</h2>
                    <p class="text-gray-500 mt-2">Terima kasih telah mengikuti ujian ini.</p>
                </div>

                <!-- Kartu Data & Skor -->
                <div class="bg-gray-50 rounded-xl p-6 border border-gray-200 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-left space-y-2">
                        <p class="text-sm text-gray-500 uppercase tracking-wider">Data Peserta</p>
                        <p class="font-medium text-gray-800"><span class="font-semibold w-16 inline-block">Nama</span>: <span id="res-name"></span></p>
                        <p class="font-medium text-gray-800"><span class="font-semibold w-16 inline-block">NIM</span>: <span id="res-nim"></span></p>
                        <p class="font-medium text-gray-800"><span class="font-semibold w-16 inline-block">Kelas</span>: <span id="res-class"></span></p>
                    </div>
                    
                    <div class="text-center bg-white p-6 rounded-lg shadow-sm border border-gray-100 w-full md:w-auto">
                        <p class="text-sm text-gray-500 uppercase tracking-wider mb-1">Skor Akhir</p>
                        <div class="text-5xl font-black text-blue-600" id="res-score">0</div>
                        <p class="text-sm font-medium mt-2"><span id="res-correct" class="text-green-600">0 Benar</span> / <span id="res-wrong" class="text-red-600">0 Salah</span></p>
                    </div>
                </div>

                <!-- Tombol aksi -->
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button id="btn-review" class="px-6 py-3 bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 font-semibold rounded-lg transition-colors">
                        Lihat Kunci Jawaban
                    </button>
                    <button onclick="location.reload()" class="px-6 py-3 bg-gray-800 hover:bg-gray-900 text-white font-semibold rounded-lg transition-colors">
                        Kembali ke Awal
                    </button>
                </div>
                
                <!-- Review Container (tersembunyi awalnya) -->
                <div id="review-container" class="hidden mt-8 pt-8 border-t border-gray-200 space-y-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Ulasan Jawaban</h3>
                    <div id="review-list" class="space-y-6">
                        <!-- Daftar review akan dirender di sini -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. DATA: Bank Soal (50 Soal) ---
        const questions = [
            // Dasar HTML & Web
            {
                question: "Apa kepanjangan dari HTML?",
                options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyper Tabular Markup Language", "None of these"],
                answer: 0
            },
            {
                question: "Tag HTML mana yang digunakan untuk membuat judul paling besar?",
                options: ["<heading>", "<h6>", "<head>", "<h1>"],
                answer: 3
            },
            {
                question: "Apa fungsi dari tag <a> dalam HTML?",
                options: ["Membuat paragraf", "Membuat tautan (hyperlink)", "Menyisipkan gambar", "Membuat tabel"],
                answer: 1
            },
            {
                question: "Atribut apa yang digunakan untuk menentukan alamat gambar pada tag <img>?",
                options: ["href", "src", "link", "url"],
                answer: 1
            },
            {
                question: "Bagaimana cara membuat list berurutan (bernomor) di HTML?",
                options: ["<ul>", "<list>", "<ol>", "<dl>"],
                answer: 2
            },
            {
                question: "Tag apa yang digunakan untuk membuat baris baru tanpa paragraf baru?",
                options: ["<break>", "<lb>", "<br>", "<newline>"],
                answer: 2
            },
            {
                question: "Di mana sebaiknya tag <title> diletakkan dalam dokumen HTML?",
                options: ["Di dalam tag <body>", "Di dalam tag <head>", "Di luar tag <html>", "Di akhir dokumen"],
                answer: 1
            },
            {
                question: "Karakter apa yang digunakan untuk menunjukkan tag penutup?",
                options: ["*", "\\", "/", "<"],
                answer: 2
            },
            {
                question: "Apa fungsi dari atribut 'alt' pada tag <img>?",
                options: ["Memberikan gaya alternatif", "Teks alternatif jika gambar gagal dimuat", "Mengubah ukuran gambar", "Menambahkan tautan ke gambar"],
                answer: 1
            },
            {
                question: "Tag mana yang mendefinisikan sebuah tabel HTML?",
                options: ["<table>", "<tr>", "<td>", "<tbl>"],
                answer: 0
            },
            
            // Dasar CSS
            {
                question: "Apa kepanjangan dari CSS?",
                options: ["Computer Style Sheets", "Creative Style Sheets", "Cascading Style Sheets", "Colorful Style Sheets"],
                answer: 2
            },
            {
                question: "Di mana tempat yang tepat untuk merujuk pada eksternal style sheet?",
                options: ["Di bagian akhir dokumen", "Di dalam bagian <body>", "Di dalam bagian <head>", "Di dalam tag <html>"],
                answer: 2
            },
            {
                question: "Tag HTML mana yang digunakan untuk mendefinisikan style internal (internal CSS)?",
                options: ["<css>", "<script>", "<style>", "<link>"],
                answer: 2
            },
            {
                question: "Atribut HTML mana yang digunakan untuk mendefinisikan style inline?",
                options: ["font", "styles", "class", "style"],
                answer: 3
            },
            {
                question: "Bagaimana cara Anda menambahkan warna latar belakang di CSS?",
                options: ["color: blue;", "background-color: blue;", "bg-color: blue;", "background: blue color;"],
                answer: 1
            },
            {
                question: "Simbol apa yang digunakan untuk memilih elemen berdasarkan id di CSS?",
                options: [".", "*", "#", "@"],
                answer: 2
            },
            {
                question: "Simbol apa yang digunakan untuk memilih elemen berdasarkan class di CSS?",
                options: ["#", ".", "*", ">"],
                answer: 1
            },
            {
                question: "Properti CSS mana yang mengontrol ukuran teks?",
                options: ["text-style", "font-size", "text-size", "font-style"],
                answer: 1
            },
            {
                question: "Bagaimana cara membuat teks menjadi tebal (bold) di CSS?",
                options: ["font: bold;", "text-decoration: bold;", "font-weight: bold;", "style: bold;"],
                answer: 2
            },
            {
                question: "Properti CSS mana yang digunakan untuk mengubah warna teks?",
                options: ["fgcolor", "color", "text-color", "font-color"],
                answer: 1
            },

            // Box Model & Layout
            {
                question: "Dalam Box Model CSS, area apa yang mengelilingi padding dan konten?",
                options: ["Margin", "Border", "Outline", "Space"],
                answer: 1
            },
            {
                question: "Properti apa yang digunakan untuk memberikan ruang transparan di LUAR border?",
                options: ["Spacing", "Padding", "Margin", "Border-spacing"],
                answer: 2
            },
            {
                question: "Properti apa yang digunakan untuk memberikan ruang transparan di DALAM border (antara border dan konten)?",
                options: ["Margin", "Spacing", "Padding", "Inner-margin"],
                answer: 2
            },
            {
                question: "Nilai default dari properti 'position' di CSS adalah?",
                options: ["relative", "fixed", "absolute", "static"],
                answer: 3
            },
            {
                question: "Sistem layout CSS mana yang sangat baik untuk menyusun elemen dalam satu baris atau satu kolom?",
                options: ["CSS Grid", "Flexbox", "Floats", "Tables"],
                answer: 1
            },
            {
                question: "Sistem layout CSS mana yang dirancang untuk layout dua dimensi (baris dan kolom)?",
                options: ["Flexbox", "CSS Grid", "Positioning", "Bootstrap"],
                answer: 1
            },
            {
                question: "Pada Flexbox, properti apa yang mengatur perataan elemen di sepanjang main axis (sumbu utama)?",
                options: ["align-items", "flex-direction", "justify-content", "align-content"],
                answer: 2
            },
            {
                question: "Media query di CSS digunakan untuk?",
                options: ["Memutar file audio/video", "Membuat animasi", "Desain web responsif berdasarkan ukuran layar", "Menghubungkan ke database"],
                answer: 2
            },

            // Dasar JavaScript
            {
                question: "Di dalam tag HTML mana kita meletakkan kode JavaScript?",
                options: ["<js>", "<script>", "<javascript>", "<scripting>"],
                answer: 1
            },
            {
                question: "Di mana tempat yang tepat untuk menyisipkan kode JavaScript?",
                options: ["Bagian <head>", "Bagian <body>", "Keduanya, <head> dan <body> bisa", "Hanya di file eksternal"],
                answer: 2
            },
            {
                question: "Bagaimana cara menulis 'Hello World' di alert box?",
                options: ["msgBox('Hello World');", "alertBox('Hello World');", "msg('Hello World');", "alert('Hello World');"],
                answer: 3
            },
            {
                question: "Bagaimana cara membuat fungsi di JavaScript?",
                options: ["function = myFunction()", "function myFunction()", "create myFunction()", "def myFunction()"],
                answer: 1
            },
            {
                question: "Bagaimana cara memanggil fungsi bernama 'myFunction'?",
                options: ["call function myFunction()", "myFunction()", "call myFunction()", "execute myFunction()"],
                answer: 1
            },
            {
                question: "Bagaimana cara menulis statemen IF di JavaScript?",
                options: ["if i = 5", "if i = 5 then", "if (i == 5)", "if i == 5 then"],
                answer: 2
            },
            {
                question: "Bagaimana cara menulis komentar satu baris di JavaScript?",
                options: ["<!-- This is a comment -->", "' This is a comment", "// This is a comment", "/* This is a comment */"],
                answer: 2
            },
            {
                question: "Apa cara yang benar untuk mendeklarasikan array di JavaScript?",
                options: ["var colors = 1 = ('red'), 2 = ('green')", "var colors = ['red', 'green', 'blue']", "var colors = (1:'red', 2:'green')", "var colors = 'red', 'green', 'blue'"],
                answer: 1
            },
            {
                question: "Event mana yang terjadi ketika pengguna mengklik elemen HTML?",
                options: ["onmouseclick", "onchange", "onclick", "onmouseover"],
                answer: 2
            },
            {
                question: "Metode mana yang digunakan untuk memilih elemen HTML berdasarkan ID-nya di JavaScript?",
                options: ["document.getElementById()", "document.querySelector()", "Kedua jawaban benar", "Tidak ada yang benar"],
                answer: 2
            },

            // Konsep Web Lanjut (HTTP, API, Framework)
            {
                question: "Apa kepanjangan dari HTTP?",
                options: ["HyperText Transfer Protocol", "HyperText Transfer Package", "HyperText Test Protocol", "Hyper Transfer Text Protocol"],
                answer: 0
            },
            {
                question: "Metode HTTP mana yang biasanya digunakan untuk mengambil data dari server?",
                options: ["POST", "GET", "PUT", "DELETE"],
                answer: 1
            },
            {
                question: "Metode HTTP mana yang biasanya digunakan untuk mengirim data baru ke server (misal: submit form)?",
                options: ["GET", "POST", "UPDATE", "PATCH"],
                answer: 1
            },
            {
                question: "Apa kepanjangan dari API?",
                options: ["Application Programming Interface", "Advanced Programming Interface", "Application Process Integration", "Automated Program Interface"],
                answer: 0
            },
            {
                question: "Format data apa yang paling umum digunakan untuk pertukaran data melalui REST API saat ini?",
                options: ["XML", "CSV", "JSON", "HTML"],
                answer: 2
            },
            {
                question: "Apa kepanjangan dari JSON?",
                options: ["JavaScript Object Notation", "JavaScript Oriented Notation", "Java Standard Object Network", "JavaScript Object Network"],
                answer: 0
            },
            {
                question: "Manakah dari berikut ini yang merupakan framework/library JavaScript untuk membangun antarmuka pengguna?",
                options: ["Laravel", "Django", "React", "Spring"],
                answer: 2
            },
            {
                question: "Bootstrap dan Tailwind CSS adalah contoh dari?",
                options: ["JavaScript Framework", "CSS Framework", "Database Management System", "Server Engine"],
                answer: 1
            },
            {
                question: "Perbedaan utama kelas dengan ID pada atribut HTML adalah?",
                options: ["ID dapat digunakan berulang kali, Class hanya sekali", "Class dapat digunakan berulang kali, ID harus unik", "Keduanya memiliki fungsi yang sama", "ID untuk JavaScript, Class untuk CSS"],
                answer: 1
            },
            {
                question: "Apakah peran utama Node.js dalam pengembangan web?",
                options: ["Mendesain antarmuka pengguna (Frontend)", "Menjalankan JavaScript di luar browser (Backend)", "Manajemen database relasional", "Styling halaman web"],
                answer: 1
            },
            {
                question: "Dalam struktur direktori web standar, file apa yang pertama kali dicari oleh web server secara default?",
                options: ["home.html", "main.html", "index.html", "start.html"],
                answer: 2
            },
            {
                question: "Atribut HTML5 apa yang digunakan untuk memastikan input field tidak boleh kosong sebelum form dikirim?",
                options: ["validate", "mandatory", "required", "important"],
                answer: 2
            }
        ];

        // --- 2. STATE MANAGEMENT ---
        let state = {
            student: {
                name: '',
                nim: '',
                classInfo: ''
            },
            currentQuestionIndex: 0,
            answers: new Array(questions.length).fill(null), // Menyimpan indeks jawaban yang dipilih
            score: 0
        };

        // --- 3. DOM ELEMENTS ---
        const viewRegistration = document.getElementById('view-registration');
        const viewQuiz = document.getElementById('view-quiz');
        const viewResult = document.getElementById('view-result');
        const regForm = document.getElementById('registration-form');
        
        // Quiz Elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const currentQNum = document.getElementById('current-question-num');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnSubmit = document.getElementById('btn-submit');
        const progressBar = document.getElementById('progress-bar');
        
        // --- 4. LOGIKA APLIKASI ---

        // Handle Submit Form Registrasi
        regForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Ambil data
            state.student.name = document.getElementById('student-name').value.trim();
            state.student.nim = document.getElementById('student-nim').value.trim();
            state.student.classInfo = document.getElementById('student-class').value;
            
            // Tampilkan info di header quiz
            document.getElementById('display-name-header').textContent = state.student.name;
            document.getElementById('display-nim-header').textContent = state.student.nim;

            // Pindah tampilan
            viewRegistration.classList.add('hidden');
            viewQuiz.classList.remove('hidden');
            
            // Load soal pertama
            loadQuestion(0);
            
            // Scroll ke atas
            window.scrollTo(0, 0);
        });

        // Load Soal berdasarkan indeks
        function loadQuestion(index) {
            const q = questions[index];
            currentQNum.textContent = index + 1;
            
            // Update Progress Bar
            const progressPercentage = ((index + 1) / questions.length) * 100;
            progressBar.style.width = `${progressPercentage}%`;

            // Set Teks Soal
            questionText.textContent = `${index + 1}. ${q.question}`;
            
            // Render Pilihan Jawaban
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const isSelected = state.answers[index] === i;
                
                const optionHtml = `
                    <div class="relative block">
                        <input type="radio" name="question${index}" id="opt${i}" value="${i}" 
                            class="peer sr-only" ${isSelected ? 'checked' : ''}
                            onchange="selectAnswer(${index}, ${i})">
                        <label for="opt${i}" 
                            class="block w-full p-4 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-colors
                            peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:ring-1 peer-checked:ring-blue-500">
                            <div class="flex items-center gap-3">
                                <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center
                                    ${isSelected ? 'border-blue-500 bg-blue-500' : 'border-gray-300'} transition-colors">
                                    ${isSelected ? '<div class="w-2.5 h-2.5 bg-white rounded-full"></div>' : ''}
                                </div>
                                <span class="text-gray-700 font-medium">${opt}</span>
                            </div>
                        </label>
                    </div>
                `;
                optionsContainer.insertAdjacentHTML('beforeend', optionHtml);
            });

            // Atur tombol navigasi
            btnPrev.disabled = index === 0;
            
            if (index === questions.length - 1) {
                btnNext.classList.add('hidden');
                btnSubmit.classList.remove('hidden');
            } else {
                btnNext.classList.remove('hidden');
                btnSubmit.classList.add('hidden');
            }
        }

        // Handle Pemilihan Jawaban (dipanggil oleh onchange input radio)
        window.selectAnswer = function(questionIndex, optionIndex) {
            state.answers[questionIndex] = optionIndex;
            // Re-render sedikit manual untuk memastikan lingkaran radio terupdate (meskipun CSS peer sudah menangani style label)
            loadQuestion(state.currentQuestionIndex); 
        };

        // Event Listener Navigasi
        btnNext.addEventListener('click', () => {
            if (state.currentQuestionIndex < questions.length - 1) {
                state.currentQuestionIndex++;
                loadQuestion(state.currentQuestionIndex);
            }
        });

        btnPrev.addEventListener('click', () => {
            if (state.currentQuestionIndex > 0) {
                state.currentQuestionIndex--;
                loadQuestion(state.currentQuestionIndex);
            }
        });

        // Hitung Skor dan Selesai
        btnSubmit.addEventListener('click', () => {
            // Cek apakah ada soal yang belum dijawab
            const unanswered = state.answers.filter(a => a === null).length;
            
            if (unanswered > 0) {
                const confirmSubmit = confirm(`Masih ada ${unanswered} soal yang belum dijawab. Yakin ingin menyelesaikan ujian?`);
                if (!confirmSubmit) return;
            }

            calculateScore();
            showResult();
        });

        function calculateScore() {
            let correct = 0;
            state.answers.forEach((ans, index) => {
                if (ans === questions[index].answer) {
                    correct++;
                }
            });
            
            state.score = (correct / questions.length) * 100;
            state.correctCount = correct;
            state.wrongCount = questions.length - correct;
        }

        function showResult() {
            viewQuiz.classList.add('hidden');
            viewResult.classList.remove('hidden');

            // Isi Data
            document.getElementById('res-name').textContent = state.student.name;
            document.getElementById('res-nim').textContent = state.student.nim;
            document.getElementById('res-class').textContent = state.student.classInfo;
            
            // Isi Skor
            const scoreEl = document.getElementById('res-score');
            // Format 2 desimal jika bukan bilangan bulat
            scoreEl.textContent = Number.isInteger(state.score) ? state.score : state.score.toFixed(1); 
            
            // Warna skor berdasarkan nilai
            if (state.score < 60) {
                scoreEl.className = "text-5xl font-black text-red-600";
            } else if (state.score < 80) {
                scoreEl.className = "text-5xl font-black text-yellow-500";
            } else {
                scoreEl.className = "text-5xl font-black text-green-600";
            }

            document.getElementById('res-correct').textContent = `${state.correctCount} Benar`;
            document.getElementById('res-wrong').textContent = `${state.wrongCount} Salah`;
            
            generateReview();
            window.scrollTo(0, 0);
        }

        // Tampilkan Review Kunci Jawaban
        const btnReview = document.getElementById('btn-review');
        const reviewContainer = document.getElementById('review-container');
        const reviewList = document.getElementById('review-list');

        btnReview.addEventListener('click', () => {
            if (reviewContainer.classList.contains('hidden')) {
                reviewContainer.classList.remove('hidden');
                btnReview.textContent = "Sembunyikan Kunci Jawaban";
            } else {
                reviewContainer.classList.add('hidden');
                btnReview.textContent = "Lihat Kunci Jawaban";
            }
        });

        function generateReview() {
            reviewList.innerHTML = '';
            questions.forEach((q, i) => {
                const userAnsIndex = state.answers[i];
                const isCorrect = userAnsIndex === q.answer;
                
                let reviewHtml = `
                    <div class="p-4 rounded-lg border ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}">
                        <p class="font-medium text-gray-800 mb-2">${i + 1}. ${q.question}</p>
                        <div class="space-y-1 text-sm">
                `;

                q.options.forEach((opt, optIndex) => {
                    let optStyle = "text-gray-600";
                    let icon = "";

                    if (optIndex === q.answer) {
                        // Kunci jawaban selalu ditandai hijau
                        optStyle = "font-bold text-green-700 bg-green-100 px-2 py-1 rounded inline-block";
                        icon = "✓";
                    } else if (optIndex === userAnsIndex && !isCorrect) {
                        // Jawaban user yang salah ditandai merah
                        optStyle = "font-bold text-red-600 line-through px-2 py-1 inline-block";
                        icon = "✗";
                    }

                    reviewHtml += `<div class="${optStyle}">${icon} ${opt} ${optIndex === userAnsIndex && isCorrect ? '(Jawaban Anda)' : ''}</div>`;
                });

                if (userAnsIndex === null) {
                    reviewHtml += `<div class="mt-2 text-red-500 text-sm italic">Anda tidak menjawab soal ini.</div>`;
                }

                reviewHtml += `</div></div>`;
                reviewList.insertAdjacentHTML('beforeend', reviewHtml);
            });
        }
    </script>
</body>
</html>
